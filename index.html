<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle CEE BAT-EQ-127</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f8f8f7; min-height: 100vh; padding: 2rem 1rem; }
.wrap { max-width: 700px; margin: 0 auto; }
h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
h1 span { color: #1a6b4a; font-style: italic; }
.sub { color: #888; font-size: 13px; margin-bottom: 2rem; }
.card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #888; margin-bottom: 6px; }
input[type=text] { width: 100%; border: 1px solid #e5e5e5; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; }
input[type=text]:focus { border-color: #1a6b4a; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
.upload-box { border: 2px dashed #ddd; border-radius: 12px; padding: 2.5rem; text-align: center; cursor: pointer; transition: .2s; }
.upload-box:hover { border-color: #1a6b4a; background: #f0faf5; }
.upload-box p { color: #555; margin-bottom: 12px; }
.upload-btn { display: inline-block; background: #111; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
.file-list { margin-top: 1rem; }
.file-item { display: flex; align-items: center; gap: 10px; background: #f5f5f5; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; }
.file-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { font-size: 11px; color: #888; }
.file-del { background: none; border: none; cursor: pointer; color: #bbb; font-size: 18px; line-height: 1; }
.file-del:hover { color: #e53; }
.btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: .2s; }
.btn-dark { background: #111; color: white; }
.btn-dark:hover:not(:disabled) { background: #333; }
.btn-dark:disabled { background: #ddd; color: #999; cursor: not-allowed; }
.btn-green { background: #1a6b4a; color: white; }
.btn-green:hover { background: #155a3e; }
.hidden { display: none !important; }
select { width: 100%; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px; font-size: 13px; }
select.ok { border-color: #1a6b4a; }
.map-row { display: grid; grid-template-columns: 1fr 70px 160px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.map-row:last-child { border-bottom: none; }
.fn { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sz { font-size: 11px; color: #888; }
#screen3 { }
.loading { text-align: center; padding: 3rem; }
.spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: #111; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-top: 8px; }
.progress-fill { height: 100%; background: #1a6b4a; border-radius: 2px; transition: width .3s; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.verdict { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.v-ok { background: #e8f5ef; color: #1a6b4a; }
.v-ko { background: #fee8e8; color: #7a1515; }
.v-warn { background: #fef3e2; color: #7a4a00; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: white; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px; text-align: center; }
.stat-n { font-size: 30px; font-weight: 700; }
.stat-l { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .06em; }
.s-ok .stat-n { color: #1a6b4a; }
.s-warn .stat-n { color: #7a4a00; }
.s-ko .stat-n { color: #7a1515; }
.section { background: white; border: 1px solid #e5e5e5; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.sec-h { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; }
.sec-h:hover { background: #fafafa; }
.sec-title { font-weight: 600; font-size: 14px; flex: 1; }
.sec-score { font-size: 12px; color: #888; }
.sec-body { padding: 10px 16px; border-top: 1px solid #f0f0f0; }
.crit { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
.crit:last-child { border-bottom: none; }
.crit-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: 700; }
.c-ok { background: #1a6b4a; }
.c-ko { background: #7a1515; }
.c-warn { background: #7a4a00; }
.c-miss { background: #bbb; }
.crit-body { flex: 1; }
.crit-label { font-size: 13px; font-weight: 500; }
.crit-detail { font-size: 11px; color: #888; margin-top: 2px; }
.synthese { background: #f5f5f5; border-left: 3px solid #111; padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 1rem; font-size: 13px; line-height: 1.6; }
.alerte { background: #fef3e2; border: 1px solid rgba(180,110,0,.2); border-radius: 8px; padding: 12px 16px; margin-bottom: 1rem; font-size: 12px; color: #7a4a00; }
.alerte ul { padding-left: 16px; margin-top: 4px; }
.actions { display: flex; gap: 10px; margin-top: 1.5rem; }
.actions button { flex: 1; padding: 11px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #ddd; background: white; }
.actions .em { background: #111; color: white; border-color: #111; }
.err { background: #fee8e8; color: #7a1515; padding: 1rem; border-radius: 8px; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Conformite <span>CEE</span></h1>
  <p class="sub">BAT-EQ-127 — Luminaires a modules LED</p>

  <!-- ECRAN 1: IMPORT -->
  <div id="screen1">
    <div class="card">
      <div class="row">
        <div><label>Nom du dossier</label><input type="text" id="nomI" placeholder="ex: Martin - Entrepot Roissy"></div>
        <div><label>Beneficiaire</label><input type="text" id="benI" placeholder="Optionnel"></div>
      </div>
      <div class="upload-box" id="dropzone">
        <p>Deposez vos fichiers PDF ici</p>
        <label for="fileInput" class="upload-btn">Choisir les fichiers</label>
        <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png" style="display:none">
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
    <button class="btn btn-dark" id="nextBtn" disabled>Suivant → Assigner les types</button>
  </div>

  <!-- ECRAN 2: MAPPING -->
  <div id="screen2" class="hidden">
    <div class="card">
      <div id="mapRows"></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-dark" onclick="goTo(1)" style="flex:0 0 100px">← Retour</button>
      <button class="btn btn-green" id="analyseBtn" style="flex:1">Lancer l'analyse IA</button>
    </div>
  </div>

  <!-- ECRAN 3: RESULTAT -->
  <div id="screen3" class="hidden">
    <button onclick="reset()" style="background:none;border:none;cursor:pointer;color:#888;font-size:13px;margin-bottom:1rem">← Nouveau dossier</button>
    <div id="resultZone"></div>
  </div>
</div>

<script>
const PROXY = 'https://cee-proxy.auryantidghi.workers.dev/';
const TYPES = [
  {v:'',l:'— Non assigne —'},
  {v:'devis',l:'Devis *'},
  {v:'facture',l:'Facture *'},
  {v:'ah',l:'Attestation Honneur *'},
  {v:'aft',l:'Attestation Fin Travaux *'},
  {v:'audit',l:'Audit energetique *'},
  {v:'rge',l:'Certificat RGE *'},
  {v:'fiche_tech',l:'Fiche technique *'},
  {v:'avis_insee',l:'Avis INSEE *'},
  {v:'photos',l:'Photos horodatees *'},
  {v:'cadastre',l:'Extrait cadastral *'},
  {v:'att_tampon',l:'Att. absence tampon'},
  {v:'autre',l:'Autre'}
];
const DETECT = [
  {v:'audit',k:['audit','energetique','bilan','luminaire']},
  {v:'devis',k:['devis','offre','proposition']},
  {v:'facture',k:['facture','invoice']},
  {v:'ah',k:['honneur','cadre a','attestation h']},
  {v:'aft',k:['fin travaux','fin de travaux']},
  {v:'rge',k:['rge','qualibat','qualifelec']},
  {v:'fiche_tech',k:['fiche technique','datasheet','caracteristique']},
  {v:'avis_insee',k:['insee','siren','siret','avis de situation']},
  {v:'photos',k:['photo','horodate','image']},
  {v:'cadastre',k:['cadastre','parcelle']}
];

let files = [], mapped = [];

function fsz(b){if(b<1024)return b+'o';if(b<1048576)return Math.round(b/1024)+'Ko';return(b/1048576).toFixed(1)+'Mo';}
function goTo(n){ [1,2,3].forEach(i=>document.getElementById('screen'+i).classList.toggle('hidden',i!==n)); window.scrollTo({top:0}); }
function reset(){ files=[]; mapped=[]; renderFiles(); goTo(1); }
function detectType(name){ const n=name.toLowerCase(); for(const d of DETECT){ if(d.k.some(k=>n.includes(k))) return d.v; } return ''; }

function renderFiles(){
  const list = document.getElementById('fileList');
  list.innerHTML = files.map((f,i) => `
    <div class="file-item">
      <span class="file-name">${f.name}</span>
      <span class="file-size">${fsz(f.size)}</span>
      <button class="file-del" onclick="removeFile(${i})">×</button>
    </div>
  `).join('');
  document.getElementById('nextBtn').disabled = files.length === 0;
}

function removeFile(i){ files.splice(i,1); renderFiles(); }

function addFiles(newFiles){
  for(const f of newFiles){
    if(!files.find(x=>x.name===f.name)) files.push(f);
  }
  renderFiles();
}

// File input
document.getElementById('fileInput').addEventListener('change', function(){
  if(this.files && this.files.length) addFiles(Array.from(this.files));
  this.value = '';
});

// Drag & drop
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e=>{e.preventDefault();dz.style.borderColor='#1a6b4a';dz.style.background='#f0faf5';});
dz.addEventListener('dragleave', ()=>{dz.style.borderColor='';dz.style.background='';});
dz.addEventListener('drop', e=>{
  e.preventDefault();dz.style.borderColor='';dz.style.background='';
  if(e.dataTransfer.files.length) addFiles(Array.from(e.dataTransfer.files));
});

// Bouton suivant
document.getElementById('nextBtn').addEventListener('click', async function(){
  this.disabled = true;
  this.textContent = 'Detection IA...';
  mapped = files.map(f => ({file:f, type:detectType(f.name)}));
  try {
    const r = await fetch(PROXY, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001', max_tokens:300,
      messages:[{role:'user',content:'Detecte le type CEE de chaque fichier par son nom. Fichiers: '+files.map((f,i)=>i+'="'+f.name+'"').join(', ')+'. Types possibles: devis,facture,ah,aft,audit,rge,fiche_tech,avis_insee,photos,cadastre,autre,"". JSON: {"r":[{"i":0,"t":"type"}]}'}]
    })});
    const d = await r.json();
    if(d.content){
      const txt = d.content[0].text.replace(/```json|```/g,'').trim();
      const res = JSON.parse(txt).r;
      mapped = files.map((f,i)=>({file:f, type:(res[i]&&res[i].t)||detectType(f.name)}));
    }
  } catch(e){}
  this.disabled = false;
  this.textContent = 'Suivant → Assigner les types';
  renderMapping();
  goTo(2);
});

function renderMapping(){
  document.getElementById('mapRows').innerHTML = mapped.map((m,i)=>{
    const opts = TYPES.map(t=>`<option value="${t.v}" ${m.type===t.v?'selected':''}>${t.l}</option>`).join('');
    return `<div class="map-row">
      <span class="fn">${m.file.name}</span>
      <span class="sz">${fsz(m.file.size)}</span>
      <select class="${m.type?'ok':''}" onchange="mapped[${i}].type=this.value;this.className=this.value?'ok':'';">${opts}</select>
    </div>`;
  }).join('');
}

// Analyse
document.getElementById('analyseBtn').addEventListener('click', async function(){
  const nom = document.getElementById('nomI').value.trim() || 'Dossier sans nom';
  const ben = document.getElementById('benI').value.trim();
  const valid = mapped.filter(m=>m.type&&m.type!=='autre');
  if(!valid.length){alert('Assignez au moins un type.');return;}
  
  goTo(3);
  const rz = document.getElementById('resultZone');
  rz.innerHTML = `<div class="loading">
    <div class="spinner"></div>
    <p id="loadMsg">Lecture des documents...</p>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>`;

  // Lire chaque fichier et extraire le texte
  const extraits = [];
  for(let i=0;i<valid.length;i++){
    const m = valid[i];
    const pct = Math.round(i/valid.length*70);
    document.getElementById('progFill').style.width = pct+'%';
    document.getElementById('loadMsg').textContent = 'Lecture '+(i+1)+'/'+valid.length+': '+m.file.name;
    
    try {
      const b64 = await toB64(m.file);
      const mt = m.file.type==='application/pdf'?'application/pdf':'image/jpeg';
      const typeLbl = TYPES.find(t=>t.v===m.type)?.l?.replace(' *','') || m.type;
      
      const r2 = await fetch(PROXY, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        model:'claude-haiku-4-5-20251001', max_tokens:500,
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:mt,data:b64}},
          {type:'text',text:'Document CEE type: '+typeLbl+'. Extrais en 200 mots max: noms, dates, references, adresses, montants, donnees techniques, signatures/tampons visibles, nb pieces si audit.'}
        ]}]
      })});
      const d2 = await r2.json();
      extraits.push('=== '+typeLbl+' ('+m.file.name+') ===\n'+(d2.content?d2.content[0].text:'Erreur lecture'));
    } catch(e){
      extraits.push('=== '+m.file.name+' ===\nErreur: '+e.message);
    }
  }

  document.getElementById('loadMsg').textContent = 'Analyse de conformite...';
  document.getElementById('progFill').style.width = '80%';

  const docsTxt = 'Dossier: '+nom+(ben?'\nBeneficiaire: '+ben:'')+'\n\n'+extraits.join('\n\n');
  const prompt = docsTxt + '\n\nCONTROLE CEE BAT-EQ-127 - CDC officiel:\n- Audit: tampon+signature BE+beneficiaire, nb pieces p5=p6 BLOQUANT\n- Devis: date+signature+cachet\n- AH: cadres A conformes\n- AFT: tampon+signature\n- RGE: valide a date devis, domaine eclairage, nom BE=audit\n- Fiche tech: reference=facture\n- Coherence: beneficiaire/adresse/dates/parcelles/surfaces identiques\n\nReponds en JSON uniquement sans backtick:\n{"statut":"conforme|non_conforme|a_controler","verdict":"texte court","synthese":"2-3 phrases","alerte":["point1","point2"],"sections":[{"nom":"Documents","criteres":[{"label":"Audit energetique","status":"ok|ko|warn|missing","detail":"..."},{"label":"Devis","status":"ok|ko|warn|missing","detail":"..."},{"label":"Facture","status":"ok|ko|warn|missing","detail":"..."},{"label":"Attestation Honneur","status":"ok|ko|warn|missing","detail":"..."},{"label":"Attestation Fin Travaux","status":"ok|ko|warn|missing","detail":"..."},{"label":"Certificat RGE","status":"ok|ko|warn|missing","detail":"..."},{"label":"Fiche technique","status":"ok|ko|warn|missing","detail":"..."},{"label":"Avis INSEE","status":"ok|ko|warn|missing","detail":"..."},{"label":"Photos horodatees","status":"ok|ko|warn|missing","detail":"..."},{"label":"Extrait cadastral","status":"ok|ko|warn|missing","detail":"..."}]},{"nom":"Regles BAT-EQ-127","criteres":[{"label":"Nb pieces p5=p6","status":"ok|ko","detail":"..."},{"label":"LED identique","status":"ok|ko|warn","detail":"..."},{"label":"RGE valide et conforme","status":"ok|ko|warn|missing","detail":"..."},{"label":"Reference facture=fiche","status":"ok|ko|warn","detail":"..."}]},{"nom":"Coherence globale","criteres":[{"label":"Beneficiaire identique","status":"ok|ko","detail":"..."},{"label":"Adresse identique","status":"ok|ko","detail":"..."},{"label":"Dates coherentes","status":"ok|ko|warn","detail":"..."},{"label":"Surfaces identiques","status":"ok|ko","detail":"..."},{"label":"Tampons et signatures","status":"ok|ko|warn","detail":"..."}]}]}';

  try {
    const r3 = await fetch(PROXY, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:3000,
      messages:[{role:'user',content:prompt}]
    })});
    const d3 = await r3.json();
    if(d3.error) throw new Error(d3.error.message);
    const txt = d3.content[0].text.replace(/```json|```/g,'').trim();
    renderResult(JSON.parse(txt), nom);
  } catch(e){
    rz.innerHTML = '<div class="err">Erreur: '+e.message+'</div>';
  }
});

function toB64(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(f);
  });
}

function renderResult(data, nom){
  const st = data.statut||'a_controler';
  let ok=0,ko=0,warn=0;
  (data.sections||[]).forEach(s=>(s.criteres||[]).forEach(c=>{
    if(c.status==='ok')ok++;else if(c.status==='ko')ko++;else if(c.status==='warn')warn++;
  }));
  const vClass = st==='conforme'?'v-ok':st==='non_conforme'?'v-ko':'v-warn';
  const vTxt = st==='conforme'?'Conforme':st==='non_conforme'?'Non conforme':'A controler';
  
  let html = `
    <div class="result-header">
      <div><strong>${nom}</strong><br><span style="color:#888;font-size:12px">BAT-EQ-127 — Luminaires LED</span></div>
      <span class="verdict ${vClass}">${vTxt}</span>
    </div>
    <div class="stats">
      <div class="stat s-ok"><div class="stat-n">${ok}</div><div class="stat-l">Conformes</div></div>
      <div class="stat s-warn"><div class="stat-n">${warn}</div><div class="stat-l">A verifier</div></div>
      <div class="stat s-ko"><div class="stat-n">${ko}</div><div class="stat-l">Non conformes</div></div>
    </div>
  `;
  
  if(data.verdict) html += `<div class="card" style="background:${st==='conforme'?'#e8f5ef':st==='non_conforme'?'#fee8e8':'#fef3e2'};font-weight:600;font-size:13px">${data.verdict}</div>`;
  if(data.alerte&&data.alerte.length) html += `<div class="alerte">Points a verifier:<ul>${data.alerte.map(a=>'<li>'+a+'</li>').join('')}</ul></div>`;
  if(data.synthese) html += `<div class="synthese">${data.synthese}</div>`;
  
  (data.sections||[]).forEach((s,si)=>{
    const sok=(s.criteres||[]).filter(c=>c.status==='ok').length;
    const sko=(s.criteres||[]).filter(c=>c.status==='ko').length;
    html += `<div class="section">
      <div class="sec-h" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <span class="sec-title">${s.nom}</span>
        <span class="sec-score">${sok}/${(s.criteres||[]).length}${sko?' — <span style="color:#7a1515">'+sko+' KO</span>':''}</span>
      </div>
      <div class="sec-body">
        ${(s.criteres||[]).map(c=>{
          const cls = {ok:'c-ok',ko:'c-ko',warn:'c-warn',missing:'c-miss'}[c.status]||'c-miss';
          const lbl = {ok:'✓',ko:'✗',warn:'!',missing:'—'}[c.status]||'—';
          return `<div class="crit">
            <div class="crit-dot ${cls}">${lbl}</div>
            <div class="crit-body">
              <div class="crit-label">${c.label}</div>
              ${c.detail?'<div class="crit-detail">'+c.detail+'</div>':''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  
  html += `<div class="actions">
    <button onclick="window.print()">Imprimer</button>
    <button class="em" onclick="reset()">Nouveau dossier</button>
  </div>`;
  
  document.getElementById('resultZone').innerHTML = html;
}
</script>
</body>
</html>
